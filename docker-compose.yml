services:
  db:
    image: postgres:16-alpine
    container_name: arsip-kima-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arsip_kima
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arsip_kima"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: node:22-alpine
    container_name: arsip-kima-backend
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/arsip_kima?schema=public
      PORT: 4000
      HOST: 0.0.0.0
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      npm install --no-fund --no-audit &&
      npx prisma generate &&
      npx prisma migrate deploy &&
      npm run start:dev
      "
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 2 -O - http://127.0.0.1:4000/ > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    container_name: arsip-kima-frontend
    working_dir: /app
    environment:
      VITE_VALHALLA_HOST: http://localhost:4000/valhalla
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    command: >
      sh -c "
      npm install --no-fund --no-audit &&
      npm run dev -- --host 0.0.0.0 --port 5173
      "
    restart: unless-stopped

  valhalla:
    image: valhalla/valhalla:run-latest
    container_name: arsip-kima-valhalla
    entrypoint:
      - /bin/bash
      - /custom_files/entrypoint.sh
    environment:
      VALHALLA_PBF_FILE: /imports/sulawesi.osm.pbf
    ports:
      - "8002:8002"
    volumes:
      - ./infra/valhalla/runtime:/data
      - ./infra/valhalla/data:/imports:ro
      - ./infra/valhalla/entrypoint.sh:/custom_files/entrypoint.sh:ro
    restart: unless-stopped

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:
