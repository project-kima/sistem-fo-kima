services:
  db:
    image: postgres:16-alpine
    container_name: arsip-kima-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arsip_kima
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arsip_kima"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: node:22-alpine
    container_name: arsip-kima-backend
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/arsip_kima?schema=public
      PORT: 4000
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      npm install --no-fund --no-audit &&
      npx prisma generate &&
      npx prisma migrate deploy &&
      npm run start:dev
      "
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    container_name: arsip-kima-frontend
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
    command: >
      sh -c "
      npm install --no-fund --no-audit &&
      npm run dev -- --host 0.0.0.0 --port 5173
      "
    restart: unless-stopped

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:
